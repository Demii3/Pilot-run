<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="home_employee.css">

  <link rel="icon" type="image/png" href="logo.jpg"/>
</head>

<body>

<!-- Navigation Bar -->
<nav class="custom-navbar">

  <div class="nav-left">
    <div class="logo-circle">
      <img src="logo.jpg" alt="Logo">
    </div>
    <span class="company-name">Chengshi <br>Construction Corp</span>
  </div>

  <div class="nav-right">
    <button class="avatar" onclick="toggleMenu()">
      <img src="profilepic.jpg" alt="User">
    </button>

    <div id="profileMenu" class="dropdown-menu">

      <div class="profile-header">
        <img src="profilepic.jpg">
        <span>User</span>
      </div>

      <a href="#" class="profile-item"> Settings & Privacy </a>
      <a href="#" class="profile-item"> Help & Support </a>
      <a href="#" class="profile-item"> Logout </a>

    </div>

  </div>
</nav>

<!-- Welcome Card -->
<div class="welcome-card">
  <div class="welcomecard-left">
    <img src="profilepic.jpg" class="profile-img">
    <div>
      <p class="welcome-text">Welcome!</p>
      <h4 class="user-name">Username</h4>
    </div>
  </div>

  <div class="welcomecard-right">
    <p id="month"></p>
    <p id="day"></p>
    <p id="year"></p>
    <h2 id="time"></h2>
  </div>
</div>

<!-- functions card -->
<div class="functions-card">
    <div class="card-icons">

      <a href="#" class="icon-item">
        <img src="attendance.png" alt="Attendance">
        <p>Attendance</p>
      </a>

      <a href="#" class="icon-item">
        <img src="payslip.png" alt="Payslip">
        <p>Payslip</p>
      </a>

    </div>
</div>



  <!-- Background -->
<div class="bg-container">
    <img src="bgimg.jpg" class="bg-image">
    <div class="overlay"></div>
</div>


<!-- JAVA RICE -->
<script>
  function toggleMenu() {
    document.getElementById("profileMenu").classList.toggle("active");
  }

  document.addEventListener("click", function(e) {
    const menu = document.getElementById("profileMenu");
    const avatar = document.querySelector(".avatar");

    if (!avatar.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.remove("active");
    }
  });

  function updateDateTime() {
  const now = new Date();

  const month = now.toLocaleString('default', { month: 'long' });
  const day = now.getDate();
  const year = now.getFullYear();

  let hours = now.getHours();
  let minutes = now.getMinutes();
  let ampm = hours >= 12 ? 'PM' : 'AM';

  hours = hours % 12;
  hours = hours ? hours : 12; // 0 becomes 12
  minutes = minutes < 10 ? '0' + minutes : minutes;

  const time = hours + ":" + minutes + " " + ampm;

  document.getElementById("month").textContent = month;
  document.getElementById("day").textContent = day;
  document.getElementById("year").textContent = year;
  document.getElementById("time").textContent = time;
}
updateDateTime();
setInterval(updateDateTime, 1000);
</script>


</body>
</html>
