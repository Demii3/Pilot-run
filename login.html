<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Login</title>

</head>

<body class="min-h-screen flex items-center justify-center">

<!-- Background -->
<div class="fixed inset-0 -z-10">

    <img src="bgimg.jpg"
         class="w-full h-full object-cover brightness-100">

    <div class="absolute inset-0 bg-black/40"></div>

</div>


<!-- Login Card -->
<div class="w-[500px] h-[500px] bg-white/10 backdrop-blur-xl rounded-2xl border border-white/20 shadow-2xl overflow-hidden flex">

    <div class=" p-10 text-white flex flex-col justify-center">

        <h1 class="text-3xl font-bold mb-2">
            LOGIN ACCOUNT
        </h1>

        <!-- Form -->
        <form action="login.php" method="POST">

            <!-- Username -->
            <label class="text-white text-sm">
                Email
            </label>

            <input
                type="text"
                name="email"
                class="w-full mt-1 mb-4 px-3 py-2 rounded-md bg-white/10 border border-white/30 focus:outline-none focus:border-blue-400"
            >


            <!-- Password -->
            <label class="text-white text-sm">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="w-full mt-1 mb-4 px-3 py-2 rounded-md bg-white/10 border border-white/30 focus:outline-none focus:border-blue-400"
            >


            <!-- Remember -->
            <div class="flex items-center gap-2 mb-4">

                <input type="checkbox" name="remember">

                <label class="text-sm">
                    Remember me.
                </label>

            </div>


            <!-- Login Button -->
            <button type="submit" class="w-full bg-[#FF16] hover:bg-[#FFC300] transition rounded-md py-2 font-bold">
            LOGIN
            </button>


            <!-- Forgot -->
            <div class="text-center mt-4">

                <a href="#" class="underline text-[#ffffff] hover:text-[#FFC300]">
                    Forgot your password?
                </a>

            </div>

        </form>

    </div>
</div>

</body>
</html>
