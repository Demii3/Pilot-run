<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="payslip_module.css">

  <link rel="icon" type="image/png" href="logo.jpg"/>
</head>

<body>

<!-- Navigation Bar -->
<nav class="custom-navbar">

  <div class="nav-left">
    <div class="logo-circle">
      <img src="logo.jpg" alt="Logo">
    </div>
    <span class="company-name">Chengshi <br>Construction Corp</span>
  </div>

  <div class="nav-right">
    <button class="avatar" onclick="toggleMenu()">
      <img src="profilepic.jpg" alt="User">
    </button>

    <div id="profileMenu" class="dropdown-menu">

      <div class="profile-header">
        <img src="profilepic.jpg">
        <span>User</span>
      </div>

      <a href="#" class="profile-item"> Settings & Privacy </a>
      <a href="#" class="profile-item"> Help & Support </a>
      <a href="#" class="profile-item"> Logout </a>

    </div>

  </div>
</nav>


<div class="payroll-container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Payroll</h2>

    <button class="dropdown-btn">Payroll
      <i class="fa fa-caret-down"></i>
    </button>
    <div class="dropdown-container">
      <hr>
      <button onclick="showContent(this,'income')">Manage Incomes</button>
      <button onclick="showContent(this,'deductions')">Manage Deductions</button>
      <button onclick="showContent(this,'employee_income')">Manage Employee Income</button>
      <button onclick="showContent(this,'employee_deductions')">Manage Employee Deductions</button>
      <button onclick="showContent(this,'attendance')">Attendance</button> 
      <hr>
      <button onclick="showContent(this,'tax')">Tax Table</button>
      <button onclick="showContent(this,'sss')">SSS Table</button>
      <button onclick="showContent(this,'philhealth')">PhilHealth</button>
      <button onclick="showContent(this,'pagibig')">Pag-IBIG</button>
      <hr>
      <button onclick="showContent(this,'process')">Process Salary</button>
      <button onclick="showContent(this,'employee_salary')">Employee Salary</button>
      <button onclick="showContent(this,'process_13')">Process 13th Month</button>
      <button onclick="showContent(this,'yearend')">Process Year-End Tax</button>
      <hr>
    </div>

    <button class="dropdown-btn">Reports
      <i class="fa fa-caret-down"></i>
    </button>
    <div class="dropdown-container">
      <hr>
      <button onclick="showContent(this,'payslip')">Payslip</button>
      <button onclick="showContent(this,'payroll_listing')">Payroll Listing</button>
      <button onclick="showContent(this,'13_month_listing')">13th Month Listing</button>
      <hr>
      <button class="dropdown-btn">Remittances
        <i class="fa fa-caret-down"></i>
      </button>
      <div class="dropdown-container">
        <hr>
        <button onclick="showContent(this,'tax')">Tax</button>
        <button onclick="showContent(this,'sss')">SSS</button>
        <button onclick="showContent(this,'philhealth')">PhilHealth</button>
        <button onclick="showContent(this,'pagibig')">Pag-IBIG</button>
        <hr>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content-area">
    <div class="card">
      <h2>Payroll Module</h2>
      <p>Select a function from the left sidebar.</p>
 
    </div>
  </div>

</div>



  <!-- Background -->
<div class="bg-container">
    <img src="bgimg.jpg" class="bg-image">
    <div class="overlay"></div>
</div>





<!-- JAVA RICE -->
<script>
  function toggleMenu() {
    document.getElementById("profileMenu").classList.toggle("active");
  }

  document.addEventListener("click", function(e) {
    const menu = document.getElementById("profileMenu");
    const avatar = document.querySelector(".avatar");

    if (!avatar.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.remove("active");
    }
  });

  document.querySelectorAll('.dropdown-container').forEach(container => {
    container.style.display = 'none';
  });

  document.querySelectorAll('.dropdown-btn').forEach(button => {
    button.addEventListener('click', function() {
      this.classList.toggle('active');
      const dropdownContent = this.nextElementSibling;
      if (dropdownContent.style.display === 'block') {
        dropdownContent.style.display = 'none';
      } else {
        dropdownContent.style.display = 'block';
      }
    });
  });

  function showContent(button, section) {

  document.querySelectorAll(".sidebar button").forEach(btn => {
    btn.classList.remove("active");
  });

  button.classList.add("active");

  const content = document.getElementById("content-area");

  if (section === "deductions") {
    content.innerHTML = `
      <div class="card">
        <h2>Manage Deductions</h2>
        <p>Setup employee income and deductions here.</p>
      </div>`;
  }

  else if (section === "income") {
      content.innerHTML = `
        <div class="card">
          <h2>Manage Income</h2>
          <p>Configure employee income details.</p>
        </div>`;
  }

  else if (section === "employee_deductions") {
    content.innerHTML = `
      <div class="card">
        <h2>Manage Employee Deductions</h2>
        <p>Assign specific deductions to employees.</p>
      </div>

      <div class="table-card">
        <h2>Manage Employee Deductions</h2>
        <p>Assign specific deductions to employees.</p>
      </div>`;
  }

  else if (section === "employee_income") {
    content.innerHTML = `
      <div class="card">
        <h2>Manage Employee Income</h2>
        <p>Assign specific income details to employees.</p>
      </div>`;
  }

  else if (section === "tax") {
    content.innerHTML = `
      <div class="card">
        <h2>Tax Table</h2>
        <p>Configure tax brackets and rules.</p>
      </div>`;
  }

  else if (section === "sss") {
    content.innerHTML = `
      <div class="card">
        <h2>SSS Table</h2>
        <p>Manage SSS contributions.</p>
      </div>`;
  }

  else if (section === "philhealth") {
    content.innerHTML = `
      <div class="card">
        <h2>PhilHealth</h2>
        <p>Setup PhilHealth contributions.</p>
      </div>`;
  }

  else if (section === "pagibig") {
    content.innerHTML = `
      <div class="card">
        <h2>Pag-IBIG</h2>
        <p>Configure Pag-IBIG deductions.</p>
      </div>`;
  }

  else if (section === "process") {
    content.innerHTML = `
      <div class="card">
        <h2>Process Salary</h2>
        <p>Calculate employee salaries and generate payroll.</p>
      </div>`;
  }

  else if (section === "reports") {
    content.innerHTML = `
      <div class="card">
        <h2>Reports</h2>
        <ul>
          <li>Payslip</li>
          <li>Payroll Listing</li>
          <li>13th Month Listing</li>
          <li>Contributions (Tax, SSS, PhilHealth, Pag-IBIG)</li>
        </ul>
      </div>`;
  }

  else if (section === "process_13") {
    content.innerHTML = `
      <div class="card">
        <h2>Process 13th Month Pay</h2>
        <p>Calculate and generate 13th month pay for employees.</p>
      </div>`;
  }

  else if (section === "yearend") {
    content.innerHTML = `
      <div class="card">
        <h2>Year-End Tax</h2>
        <p>Process annual tax adjustments and summaries.</p>
      </div>`;
  }
}

</script>


</body>
</html>
